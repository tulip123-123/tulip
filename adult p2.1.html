                opt: ["Exaggerates achievements", "Expects automatic compliance", "Has robust self-esteem", "Is interpersonally exploitative", "Requires excessive admiration"],
                ans: "Has robust self-esteem",
                exp: "Self-esteem is almost invariably very fragile in narcissistic personality disorder."
            },
            {
                q: "Q14 Question Stem: A 19 year old man is anxious that his genitals are misshapen. He remains convinced of this despite of plastic surgeon reassuring him by showing multiple images of normal genital appearances. He has not responded to psychological interventions and wants to pursue medication options. Which of the following interventions has evidence based support in the above situation?",
                opt: ["Olanzapine", "Pimozide", "Escitalopram", "Surgical correction", "Fluoxetine"],
                ans: "Fluoxetine",
                exp: "The presents with body dysmorphic disorder, which is characterized by preoccupation with one or more perceived defects or flaws in physical appearance that are not observable or appear only slight to others, and by repetitive behaviors (e.g., mirror checking, excessive grooming, skin picking, or..."
            },
            {
                q: "Q12 Question Stem: A patient develops tardive dyskinesia whilst using haloperidol. Which of the following should they be changed to?",
                opt: ["Zuclopenthixol", "Chlorpromazine", "Sulpiride", "Risperidone", "Quetiapine"],
                ans: "Quetiapine",
                exp: "Once TD develops, it is common practice to withdraw the prescribed antipsychotic and change to an atypical antipsychotic (if not already on one). The following are specifically recommended (note that withdrawal may initially worsen the TD):- Clozapine, Quetiapine. If the patient is on an anticholinergic this should be discontinued. If withdrawing the antipsychotic is not effective or advisable the following are used: Tetrabenzine (only licensed med for TD in the UK), Benzodiazepines, Vitamin E ("
            }
        ];

        // The total is 84 questions. The remainder will be appended in the next part.
        let totalQuestionsCount = 84; 

        let currentQuestionIndex = 0;
        let userAnswers = new Array(totalQuestionsCount).fill(null);

        // DOM Elements
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const explanationContainer = document.getElementById('explanation-container');
        const explanationText = document.getElementById('explanation-text');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const finishBtn = document.getElementById('finish-btn');
        const progressText = document.getElementById('progress-text');
        const progressBar = document.getElementById('progress-bar');
        const scoreText = document.getElementById('score-text');
        const quizContainer = document.getElementById('quiz-container');
        const summaryContainer = document.getElementById('summary-container');

        function initQuiz() {
            renderQuestion();
        }

        function calculateScore() {
            return userAnswers.filter(ans => ans && ans.isCorrect).length;
        }

        function renderQuestion() {
            const currentQ = mcqs[currentQuestionIndex];
            const savedAnswer = userAnswers[currentQuestionIndex];

            // Reset UI for the question
            explanationContainer.classList.add('hidden');
            optionsContainer.innerHTML = '';
            
            // Update Text & Progress
            questionText.textContent = currentQ.q;
            progressText.textContent = `Question ${currentQuestionIndex + 1} of ${mcqs.length}`; 
            scoreText.textContent = `Score: ${calculateScore()}`;
            progressBar.style.width = `${((currentQuestionIndex) / mcqs.length) * 100}%`;

            // Update Navigation state
            prevBtn.disabled = currentQuestionIndex === 0;
            
            if (currentQuestionIndex === mcqs.length - 1) {
                nextBtn.classList.add('hidden');
                finishBtn.classList.remove('hidden');
            } else {
                nextBtn.classList.remove('hidden');
                finishBtn.classList.add('hidden');
            }

            // Render Options
            currentQ.opt.forEach((option, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-xl border-2 border-slate-200 bg-white hover:border-indigo-300 hover:bg-slate-50 text-slate-700 font-medium shadow-sm flex items-start';
                
                btn.innerHTML = `<span class="leading-tight">${option}</span>`;
                
                // If question was already answered, style it and show explanation
                if (savedAnswer) {
                    btn.disabled = true;
                    
                    const isCorrectOption = option.includes(currentQ.ans);
                    const isSelectedOption = option === savedAnswer.selected;
                    
                    if (isCorrectOption) {
                        btn.classList.add('correct');
                    } else if (isSelectedOption && !savedAnswer.isCorrect) {
                        btn.classList.add('incorrect');
                    }

                    showExplanation(currentQ.exp);
                    if(currentQuestionIndex !== mcqs.length - 1) {
                        nextBtn.textContent = 'Next →';
                    }
                } else {
                    btn.onclick = () => handleAnswer(btn, option, currentQ.ans, currentQ.exp);
                    nextBtn.textContent = 'Skip / Next →';
                }
                
                optionsContainer.appendChild(btn);
            });
        }

        function handleAnswer(selectedBtn, selectedOption, correctOption, explanation) {
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(btn => btn.disabled = true); 

            const isCorrect = selectedOption.includes(correctOption) || correctOption === "Unknown (cut off in source)";
            
            userAnswers[currentQuestionIndex] = {
                selected: selectedOption,
                isCorrect: isCorrect
            };

            if (isCorrect) {
                selectedBtn.classList.add('correct');
            } else {
                selectedBtn.classList.add('incorrect');
                // Highlight the correct one
                allBtns.forEach(btn => {
                    if(btn.textContent.includes(correctOption)) {
                        btn.classList.add('correct');
                    }
                });
            }

            scoreText.textContent = `Score: ${calculateScore()}`;
            showExplanation(explanation);
            
            if(currentQuestionIndex !== mcqs.length - 1) {
                nextBtn.textContent = 'Next →';
            }
        }

        function showExplanation(explanation) {
            explanationText.textContent = explanation || "No further explanation provided in the source material.";
            explanationContainer.classList.remove('hidden');
        }

        // Navigation Listeners
        prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                renderQuestion();
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < mcqs.length - 1) {
                currentQuestionIndex++;
                renderQuestion();
            }
        });

        finishBtn.addEventListener('click', () => {
            showSummary();
        });

        function showSummary() {
            quizContainer.classList.add('hidden');
            summaryContainer.classList.remove('hidden');
            progressBar.style.width = `100%`;
            progressText.textContent = `Completed`;

            const finalScore = calculateScore();
            const attempted = userAnswers.filter(ans => ans !== null).length;

            document.getElementById('final-score').textContent = `${finalScore} / ${mcqs.length}`;
            document.getElementById('attempted-text').textContent = `You attempted ${attempted} out of ${mcqs.length} questions.`;
            
            const percentage = (finalScore / mcqs.length) * 100;
            const msgEl = document.getElementById('performance-message');
            
            if(percentage >= 80) msgEl.textContent = "Excellent work! You have a highly advanced grasp of this clinical material.";
            else if(percentage >= 60) msgEl.textContent = "Good job. Ensure you review the clinical explanations for the ones you missed.";
            else msgEl.textContent = "Keep studying! Use this module repeatedly to drill these high-yield board concepts.";
        }

        // Start App
        initQuiz();
    </script>
</body>
</html>
